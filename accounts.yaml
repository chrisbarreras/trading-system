# Trading System Account Configuration
#
# Each account maps to one Alpaca paper trading account and one strategy.
# API keys can be literal strings or environment variable references: ${VAR_NAME}
#
# type: swing  - scans daily bars, runs once per day at 09:35 ET
# type: day    - scans 15m bars, runs every 15 min during market hours,
#                closes all positions at 15:55 ET
#
# Supported strategies: rsi, macd, ma_cross, bb, combo
#
# NOTE FOR BACKTESTING: API keys are used only to fetch historical data.
# All swing_backtest_* accounts below can share the same key pair.
# For live trading, each account needs its own Alpaca paper account key pair.

symbols_file: stock_symbols_top500.txt

# ---------------------------------------------------------------------------
# Live trading accounts (each needs its own Alpaca paper account key pair)
# ---------------------------------------------------------------------------

accounts:
  - id: swing_rsi_1
    name: "Swing RSI"
    type: swing
    alpaca_api_key: ${ALPACA_API_KEY}
    alpaca_secret_key: ${ALPACA_SECRET_KEY}
    strategy: rsi
    strategy_params:
      period: 14
      oversold: 30
      overbought: 70
    risk:
      position_size_pct: 0.10
      max_positions: 5
      max_position_size_usd: 10000.0
      min_buying_power: 100.0
      min_trade_size_usd: 50.0
      buying_power_reserve_pct: 0.05

